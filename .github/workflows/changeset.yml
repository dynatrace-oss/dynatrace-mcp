name: Changesets

on:
  push:
    branches: [main]

permissions:
  contents: write # Required to push the Version Packages branch and create tags
  pull-requests: write # Required to create/update the Version Packages PR
  id-token: write # Required for npm publishing with provenance

jobs:
  changeset:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Node.js # will read version from .nvmrc
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          # Script to bump versions and update CHANGELOG.md. Also syncs server.json
          # and gemini-extension.json via scripts/changeset-version.js.
          version: npm run changeset:version
          # Script to publish to npm. NPM_CONFIG_PROVENANCE enables build provenance.
          publish: npm run changeset:publish
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

      - name: Publish to MCP Registry
        if: steps.changesets.outputs.published == 'true'
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
