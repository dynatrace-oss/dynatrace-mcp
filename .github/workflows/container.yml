name: Container

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build container
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: dynatrace-mcp:latest

      - name: Start container
        run: |
          docker run --rm -d --name mcp-smoke \
            -e DT_MCP_DISABLE_TELEMETRY=true \
            -e DT_ENVIRONMENT=https://abc12345.apps.dynatrace.com \
            dynatrace-mcp:latest --http --host 0.0.0.0

      - name: Wait for HTTP server to start
        run: timeout 30 sh -c 'until docker logs mcp-smoke 2>&1 | grep -q "running on HTTP"; do sleep 1; done'

      - name: Verify container is still running
        run: docker inspect --format='{{.State.Running}}' mcp-smoke | grep -q true

      - name: Stop container
        if: always()
        run: docker stop mcp-smoke || true
