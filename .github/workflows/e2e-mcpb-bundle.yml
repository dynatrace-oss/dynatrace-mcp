name: E2E – MCPB Bundle

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mcpb-bundle:
    name: Verify MCPB bundle runs with Node.js
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Download latest MCPB bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/mcpb
          gh release download \
            --repo dynatrace-oss/dynatrace-mcp \
            --pattern '*.mcpb' \
            --dir /tmp/mcpb

      - name: Extract bundle
        run: unzip /tmp/mcpb/*.mcpb -d /tmp/mcpb/extracted

      - name: Verify entry point exists
        run: test -f /tmp/mcpb/extracted/dist/index.js

      - name: Run bundle and verify output
        run: |
          OUTPUT=$(DT_MCP_DISABLE_TELEMETRY=true node /tmp/mcpb/extracted/dist/index.js 2>&1 || true)
          echo "$OUTPUT"

          if echo "$OUTPUT" | grep -q "Cannot find module"; then
            echo "FAIL: bundle is missing a required Node.js module – the bundle is incomplete"
            exit 1
          fi

          if ! echo "$OUTPUT" | grep -q "DT_ENVIRONMENT"; then
            echo "FAIL: expected startup output to mention DT_ENVIRONMENT"
            exit 1
          fi

          echo "PASS: MCPB bundle started correctly"
