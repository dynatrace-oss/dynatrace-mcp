name: Create Release PR

# Triggers on every push to main so that a Release PR is always kept up-to-date.
# Skips automatically when the triggering commit is itself a release-preparation commit
# (i.e. merging the Release PR would not spawn another Release PR).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # Required to push the release branch
  pull-requests: write # Required to create / update the PR
  models: read # Required for GitHub Models API (AI release notes generation)

jobs:
  # ── Guard ────────────────────────────────────────────────────────────────────
  # Skip the whole workflow when the latest commit on main is a release commit
  # to avoid an infinite cycle of Release PRs being created.
  check:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@v6

      - name: Detect release commit
        id: check
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:%s)
          if [[ "$COMMIT_MSG" == chore\(release\):* ]]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: last commit is a release-preparation commit."
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Create / update Release PR ───────────────────────────────────────────────
  create-release-pr:
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Full history for git describe / git log

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm ci

      # ── Determine the next patch version ─────────────────────────────────────
      - name: Compute next patch version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          NEXT=$(node -p "
            const [major, minor, patch] = '${CURRENT}'.split('.');
            \`\${major}.\${minor}.\${parseInt(patch, 10) + 1}\`
          ")
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "next=${NEXT}"        >> "$GITHUB_OUTPUT"
          echo "branch=chore/prepare-next-patch-release" >> "$GITHUB_OUTPUT"

      # ── Build the release branch ──────────────────────────────────────────────
      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create release branch from main
        run: |
          BRANCH="${{ steps.version.outputs.branch }}"
          # Start from a clean local branch (always based on the current main HEAD)
          git checkout -b "$BRANCH"

      - name: Prepare CHANGELOG with GitHub Copilot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_VERSION: ${{ steps.version.outputs.next }}
        run: |
          python3 - << 'PYEOF'
          import json, os, re, sys, urllib.request, urllib.error

          version = os.environ['NEXT_VERSION']
          token   = os.environ['GITHUB_TOKEN']

          # Load changelog style guide (strip YAML frontmatter)
          with open('.github/instructions/changelog.instructions.md') as f:
              guidelines = re.sub(r'^---\s*\n.*?---\s*\n', '', f.read(), count=1, flags=re.DOTALL).strip()

          # Load current CHANGELOG.md
          with open('CHANGELOG.md') as f:
              changelog = f.read()

          # Prompt mirrors steps 4 and 5 of .github/prompts/release.prompt.md
          prompt = (
              'You are preparing a software release. Follow these changelog guidelines:\n\n'
              + guidelines + '\n\n'
              + 'Here is the current CHANGELOG.md:\n\n'
              + changelog + '\n\n'
              + f'4. Create a new section "## {version}" in CHANGELOG.md immediately below "## Unreleased Changes".\n'
              + '5. Move all entries from "## Unreleased Changes" to this new section. '
              + 'Reword them in the process to fit the content guidelines above.\n\n'
              + 'Output ONLY the complete updated CHANGELOG.md. No markdown code fences, no explanation.'
          )

          payload = json.dumps({
              'model': 'gpt-4o-mini',
              'messages': [{'role': 'user', 'content': prompt}],
              'temperature': 0.3,
          }).encode()

          req = urllib.request.Request(
              'https://models.inference.ai.azure.com/chat/completions',
              data=payload,
              headers={
                  'Content-Type': 'application/json',
                  'Authorization': f'Bearer {token}',
              },
              method='POST',
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  result = json.loads(resp.read())
          except urllib.error.HTTPError as e:
              print(f'GitHub Models API error {e.code}: {e.reason}', file=sys.stderr)
              print(e.read().decode(), file=sys.stderr)
              sys.exit(1)

          content = result['choices'][0]['message']['content'].strip()
          # Strip accidental code fences if the model wrapped the output
          if content.startswith('```'):
              content = re.sub(r'^```[^\n]*\n', '', content)
              content = re.sub(r'\n```$', '', content)

          with open('CHANGELOG.md', 'w') as f:
              f.write(content + '\n')

          print(f'CHANGELOG.md updated with "## {version}" section.')
          PYEOF

      - name: Bump version in package.json (and package-lock.json)
        run: npm version ${{ steps.version.outputs.next }} --no-git-tag-version

      - name: Update versions in server.json and gemini-extension.json
        run: npm run release:update-versions -- ${{ steps.version.outputs.next }}

      - name: Commit release preparations
        run: |
          git add CHANGELOG.md package.json package-lock.json server.json gemini-extension.json
          git commit -m "chore(release): prepare for ${{ steps.version.outputs.next }} release"

      - name: Force-push release branch
        run: git push --force origin "${{ steps.version.outputs.branch }}"

      # ── Create or update the PR ───────────────────────────────────────────────
      - name: Create or update Release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ steps.version.outputs.branch }}"
          CURRENT="${{ steps.version.outputs.current }}"
          NEXT="${{ steps.version.outputs.next }}"
          TITLE="chore(release): prepare ${NEXT} patch release"
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/workflows/release-pr.yml"

          cat > /tmp/pr_body.md << HEREDOC
Bumps version from \`${CURRENT}\` → \`${NEXT}\` and documents all changes accumulated since the last release.

## What's included

- **CHANGELOG**: Added \`## ${NEXT}\` section with all unreleased changes
- **Version bump** in \`package.json\`, \`server.json\` (×2), and \`gemini-extension.json\`
- **\`package-lock.json\`** synced via \`npm install --package-lock-only\`

---
_This PR was automatically created/updated by the [Create Release PR](${WORKFLOW_URL}) workflow._
HEREDOC

          # Check whether a PR for this branch already exists
          EXISTING_PR=$(gh pr list \
            --head "$BRANCH" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || true)

          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing PR #${EXISTING_PR}"
            gh pr edit "$EXISTING_PR" \
              --title "$TITLE" \
              --body-file /tmp/pr_body.md
          else
            echo "Creating new Release PR"
            gh pr create \
              --base  main \
              --head  "$BRANCH" \
              --title "$TITLE" \
              --body-file /tmp/pr_body.md
          fi
