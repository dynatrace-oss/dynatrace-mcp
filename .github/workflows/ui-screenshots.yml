name: UI Screenshots

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/ui/**'
      - 'scripts/take-screenshots.mjs'
      - 'vite.config.mts'

permissions:
  contents: read
  pull-requests: write

jobs:
  screenshot:
    name: Take UI Screenshots
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: |
          npm install --no-save playwright@1.58.2
          npx playwright install chromium --with-deps

      - name: Build UI
        run: npm run build:ui:app && npm run build:ui:preview

      - name: Take screenshots
        run: node scripts/take-screenshots.mjs --output screenshots

      - name: Upload screenshots as artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshots
          path: screenshots/
          retention-days: 30

      - name: Post screenshot comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactUrl = `${runUrl}#artifacts`;

            const screenshotRows = [
              ['execute-dql-table',   'DQL Results – Table View'],
              ['execute-dql-loading', 'DQL Results – Loading State'],
              ['execute-dql-error',   'DQL Results – Error State'],
              ['execute-dql-empty',   'DQL Results – Empty Results'],
            ];

            const rows = screenshotRows
              .map(([name, label]) => `| ${label} | \`${name}.png\` |`)
              .join('\n');

            const body = [
              '## UI Screenshots',
              '',
              'Automated screenshots of the MCP App UI were captured for this PR.',
              `Download the **[ui-screenshots artifact](${artifactUrl})** to view them.`,
              '',
              '| State | File |',
              '|---|---|',
              rows,
              '',
              '---',
              '_This comment was automatically generated by the UI Screenshots workflow._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(
              (c) => c.body.includes('## UI Screenshots') && c.user.type === 'Bot',
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log('Updated existing UI Screenshots comment');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
              console.log('Created UI Screenshots comment');
            }
